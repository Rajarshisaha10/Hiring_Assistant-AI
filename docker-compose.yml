version: '3.8'

services:
  web:
    build: .
    container_name: hiring_assistant
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - LOG_LEVEL=INFO
    volumes:
      - ./uploads:/app/uploads
      - ./app.log:/app/app.log
    restart: unless-stopped
